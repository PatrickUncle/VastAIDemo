    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 全局变量
            let uploadedFiles = [];
            
            // DOM 元素
            const fileUpload = document.getElementById('file-upload');
            const uploadedFilesContainer = document.getElementById('uploaded-files');
            const noFilesMessage = document.getElementById('no-files');
            const chatInput = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');
            const chatMessages = document.getElementById('chat-messages');
            const issueTitle = document.getElementById('issue-title');
            const issueType = document.getElementById('issue-type');
            const issueDescription = document.getElementById('issue-description');
            const clearIssueBtn = document.getElementById('clear-issue');
            const submitIssueBtn = document.getElementById('submit-issue');

            
            let currentModel = 'GLM-5';
            
            // 模型管理相关函数
            function saveModel(modelData) {
                const models = getModels();
                models.push(modelData);
                localStorage.setItem('models', JSON.stringify(models));
            }
            
            function getModels() {
                return JSON.parse(localStorage.getItem('models') || '[]');
            }
            
            function deleteModel(modelId) {
                console.log('删除模型ID:', modelId);
                const models = getModels();
                console.log('删除前模型列表:', models);
                const updatedModels = models.filter(model => model.id !== modelId);
                console.log('删除后模型列表:', updatedModels);
                localStorage.setItem('models', JSON.stringify(updatedModels));
                console.log('localStorage中的模型:', localStorage.getItem('models'));
            }
            
            function initDefaultModel() {
                currentModel = 'GLM-5';
            }
            
            // 加载模型列表
            function loadModelList() {
                const models = getModels();
                console.log('加载模型列表:', models);
                const modelList = document.getElementById('model-list');
                
                // 先清空模型列表（保留 noModelsTip 元素）
                const existingNoModelsTip = document.getElementById('no-models-tip');
                
                // 清空所有内容
                modelList.innerHTML = '';
                
                if (models.length > 0) {
                    // 有模型时，渲染模型列表
                    models.forEach(model => {
                        const modelItem = document.createElement('div');
                        modelItem.className = 'px-3 py-2 hover:bg-gray-50 cursor-pointer flex items-center justify-between';
                        modelItem.innerHTML = `
                            <div>
                                <p class="font-medium">${model.name}</p>
                                <p class="text-xs text-gray-500">${model.type === 'dify-api' ? 'Dify API' : 'BigModel'}</p>
                            </div>
                            <button class="delete-model-btn text-gray-400 hover:text-red-500 px-2 py-1 rounded hover:bg-red-50 flex items-center gap-1">
                                <i class="fa fa-trash"></i>
                                <span>删除</span>
                            </button>
                        `;
                        
                        // 添加删除按钮事件监听器
                        const deleteBtn = modelItem.querySelector('.delete-model-btn');
                        deleteBtn.addEventListener('click', function(e) {
                            e.stopPropagation(); // 阻止事件冒泡
                            console.log('点击删除按钮，模型ID:', model.id);
                            deleteModel(model.id);
                            // 立即更新模型列表
                            loadModelList();
                        });
                        
                        modelItem.addEventListener('click', function(e) {
                            if (!e.target.closest('.delete-model-btn')) {
                                selectModel(model);
                            }
                        });
                        
                        modelList.appendChild(modelItem);
                    });
                } else {
                    // 无模型时，显示提示
                    const noModelsTip = document.createElement('div');
                    noModelsTip.id = 'no-models-tip';
                    noModelsTip.className = 'text-center py-4 text-gray-400 text-sm';
                    noModelsTip.innerHTML = `
                        <i class="fa fa-inbox text-2xl mb-2"></i>

            function readFileContent(file) {
                return new Promise((resolve, reject) => {
                    console.log('[readFileContent] 开始读取文件:', file.name);
                    console.log('[readFileContent] 文件类型:', file.type);
                    console.log('[readFileContent] 文件大小:', file.size, 'bytes');
                    
                    const reader = new FileReader();
                    
                    reader.onload = (e) => {
                        console.log('[readFileContent] 文件读取成功');
                        console.log('[readFileContent] 读取结果长度:', e.target.result ? e.target.result.length : 0);
                        resolve(e.target.result);
                    };
                    
                    reader.onerror = (e) => {
                        console.error('[readFileContent] 文件读取失败');
                        console.error('[readFileContent] 错误事件:', e);
                        console.error('[readFileContent] FileReader readyState:', reader.readyState);
                        console.error('[readFileContent] FileReader error:', reader.error);
                        reject(new Error(`文件读取失败: ${reader.error ? reader.error.toString() : '未知错误'}`));
                    };
                    
                    reader.onabort = (e) => {
                        console.error('[readFileContent] 文件读取被中止');
                        reject(new Error('文件读取被中止'));
                    };
                    
                    try {
                        reader.readAsText(file);
                        console.log('[readFileContent] 已调用 readAsText');
                    } catch (err) {
                        console.error('[readFileContent] readAsText 调用异常:', err);
                        reject(new Error(`readAsText 调用异常: ${err.message}`));
                    }
                });
            }
            
            async function parseFileWithGLM(file, modelConfig) {
                console.log('[parseFileWithGLM] ========== 开始解析文件 ==========');
                console.log('[parseFileWithGLM] 文件名:', file.name);
                console.log('[parseFileWithGLM] 文件类型 (MIME):', file.type);
                console.log('[parseFileWithGLM] 文件大小:', file.size, 'bytes');
                
                const fileExtension = file.name.split('.').pop().toLowerCase();
                console.log('[parseFileWithGLM] 文件扩展名:', fileExtension);
                
                const textExtensions = ['txt', 'md', 'json', 'js', 'ts', 'html', 'css', 'xml', 'csv', 'log', 'py', 'java', 'c', 'cpp', 'h', 'sql', 'yaml', 'yml', 'ini', 'conf', 'sh', 'bat'];
                const binaryExtensions = ['docx', 'doc', 'pdf', 'xlsx', 'xls', 'pptx', 'ppt', 'zip', 'rar', '7z', 'exe', 'dll'];
                
                console.log('[parseFileWithGLM] 是否为文本扩展名:', textExtensions.includes(fileExtension));
                console.log('[parseFileWithGLM] 是否为二进制扩展名:', binaryExtensions.includes(fileExtension));
                
                if (binaryExtensions.includes(fileExtension)) {
                    console.warn('[parseFileWithGLM] ⚠️ 检测到二进制文件格式:', fileExtension);
                    console.warn('[parseFileWithGLM] 此类文件需要专门的解析库，直接用 readAsText 读取会产生乱码或错误');
                    console.warn('[parseFileWithGLM] 建议: 使用 Dify 模式上传此类文件，或添加专门的文件解析服务');
                }
                
                if (textExtensions.includes(fileExtension)) {
                    console.log('[parseFileWithGLM] 文本文件，直接读取:', file.name);
                    try {
                        const content = await readFileContent(file);
                        console.log('[parseFileWithGLM] 文件解析成功，内容长度:', content.length);
                        return content;
                    } catch (err) {
                        console.error('[parseFileWithGLM] 文本文件读取失败:', err);
                        throw err;
                    }
                }
                
                console.log('[parseFileWithGLM] 非标准文本文件，尝试直接读取原始内容');
                console.log('[parseFileWithGLM] 注意: GLM Coding Plan 不支持付费文件解析服务');
                console.log('[parseFileWithGLM] 对于二进制文件（如 .docx），读取结果可能是乱码');
                
                try {
                    const content = await readFileContent(file);
                    console.log('[parseFileWithGLM] 文件读取完成，内容长度:', content.length);
                    if (content.length > 0 && content.charCodeAt(0) === 0xFEFF) {
                        console.log('[parseFileWithGLM] 检测到 BOM 头 (UTF-8)');
                    }
                    const previewLen = Math.min(100, content.length);
                    console.log('[parseFileWithGLM] 内容预览 (前', previewLen, '字符):', content.substring(0, previewLen));
                    return content;
                } catch (err) {
                    console.error('[parseFileWithGLM] 文件解析失败:', err);
                    throw new Error(`文件 ${file.name} 解析失败: ${err.message}`);
                }
            }
            
            async function analyzeFileWithDify(fileObj) {
                try {
                    const models = getModels();
                    const selectedModelObj = models.find(m => m.name === currentModel);
                    
                    let apiKey;
                    if (selectedModelObj && selectedModelObj.apiKey) {
                        apiKey = selectedModelObj.apiKey;
                    } else {
                        addMessage('ai', `模型 ${currentModel} 没有配置API密钥。请在模型列表中选择已配置的模型。`);
                        return;
                    }
                    
                    const savedConfig = localStorage.getItem('modelConfig');
                    const config = savedConfig ? JSON.parse(savedConfig) : {
                        apiBaseUrl: 'http://localhost:8004/api',
                        apiKey: apiKey
                    };
                    
                    const requestData = {
                        inputs: {},
                        query: `请分析并总结文件 ${fileObj.name} 的内容`,
                        response_mode: 'blocking',
                        conversation_id: localStorage.getItem('conversationId') || '',
                        user: 'user-' + Date.now(),
                        files: [{
                            type: 'document',
                            transfer_method: 'local_file',
                            upload_file_id: fileObj.difyFileId
                        }]
                    };
                    
                    const response = await fetch(`${config.apiBaseUrl}/chat-messages`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify(requestData)
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        if (data.conversation_id) {
                            localStorage.setItem('conversationId', data.conversation_id);
                        }
                        addMessage('ai', data.answer);
                    } else {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(`文件分析失败: ${errorData.error || response.statusText}`);
                    }
                } catch (error) {
                    console.error('文件分析失败:', error);
                    addMessage('ai', `文件 ${fileObj.name} 分析失败，请稍后重试。`);
                }
            }

            window.chatWithFile = async function(fileId) {
                const file = uploadedFiles.find(f => f.id === fileId);
                if (!file) {
                    addMessage('ai', '文件未找到，请重新上传。');
                    return;
                }
                
                addMessage('user', `我想了解文件 ${file.name} 的内容`);
                
                try {
                    const models = getModels();
                    const selectedModelObj = models.find(m => m.name === currentModel);
                    
                    if (!selectedModelObj || !selectedModelObj.apiKey) {
                        addMessage('ai', `模型 ${currentModel} 没有配置API密钥。请在模型列表中选择已配置的模型。`);
                        return;
                    }
                    
                    const apiKey = selectedModelObj.apiKey;
                    const isGLM = selectedModelObj.type === 'bigmodel';
                    
                    if (isGLM) {
                        await chatWithFileViaBigModel(file, selectedModelObj, apiKey);
                    } else {
                        await chatWithFileViaDify(file, selectedModelObj, apiKey);
                    }
                } catch (error) {
                    console.error('文件对话失败:', error);
                    addMessage('ai', `文件 ${file.name} 对话失败: ${error.message}`);
                }
            };
            
            async function chatWithFileViaBigModel(file, modelConfig, apiKey) {
                try {
                    const modelMap = {
                        'glm-5': 'glm-5',
                        'glm-4.7': 'glm-4.7v',
                        'glm-4v': 'glm-4v'
                    };
                    
                    const modelName = modelMap[modelConfig.bigmodel] || 'glm-5';
                    const apiUrl = 'https://open.bigmodel.cn/api/coding/paas/v4/chat/completions';
                    
                    const conversationHistory = JSON.parse(localStorage.getItem('bigmodel_conversation_history') || '[]');
                    
                    let fileContent = file.content || '';
                    const maxContentLength = 8000;
                    if (fileContent.length > maxContentLength) {
                        fileContent = fileContent.substring(0, maxContentLength) + '\n...[内容过长已截断]';
                    }
                    
                    const userMessage = `请分析并详细解释以下文件的内容：\n\n文件名: ${file.name}\n文件大小: ${formatFileSize(file.size)}\n\n文件内容:\n${fileContent}`;
                    
                    conversationHistory.push({
                        role: 'user',
                        content: userMessage
                    });
                    
                    const requestData = {
                        model: modelName,
                        messages: conversationHistory
                    };
                    
                    const response = await fetch(apiUrl, {
                        method: 'POST',

            async function callBigModelAPI(message, modelConfig, apiKey) {
                try {
                    const modelMap = {
                        'glm-5': 'glm-5',
                        'glm-4.7': 'glm-4.7v',
                        'glm-4v': 'glm-4v'
                    };
                    
                    const modelName = modelMap[modelConfig.bigmodel] || 'glm-5';
                    const apiUrl = 'https://open.bigmodel.cn/api/coding/paas/v4/chat/completions';
                    
                    let conversationHistory = JSON.parse(localStorage.getItem('bigmodel_conversation_history') || '[]');
                    
                    const trimmedHistory = [];
                    let totalLength = 0;
                    const maxHistoryLength = 6000;
                    for (let i = conversationHistory.length - 1; i >= 0; i--) {
                        const msg = conversationHistory[i];
                        if (totalLength + msg.content.length > maxHistoryLength) break;
                        trimmedHistory.unshift(msg);
                        totalLength += msg.content.length;
                    }
                    conversationHistory = trimmedHistory;
                    
                    let enhancedMessage = message;
                    const filesWithContext = uploadedFiles.filter(f => f.content);
                    if (filesWithContext.length > 0) {
                        let fileContext = '\n\n【已上传的文件内容】\n';
                        const maxFileContent = 4000;
                        let currentFileLength = 0;
                        for (const file of filesWithContext) {
                            if (currentFileLength >= maxFileContent) break;
                            const remainingSpace = maxFileContent - currentFileLength;
                            const truncatedContent = file.content.length > remainingSpace 
                                ? file.content.substring(0, remainingSpace) + '\n...[内容过长已截断]' 
                                : file.content;
                            fileContext += `\n=== 文件: ${file.name} ===\n${truncatedContent}\n`;
                            currentFileLength += truncatedContent.length;
                        }
                        fileContext += '\n【以上是已上传的文件内容，请在回答时参考这些内容】\n';
                        enhancedMessage = fileContext + '\n用户问题: ' + message;
                    }
                    
                    const messagesForRequest = [
                        ...conversationHistory,
                        {
                            role: 'user',
                            content: enhancedMessage
                        }
                    ];
                    
                    const requestData = {
                        model: modelName,
                        messages: messagesForRequest
                    };
                    
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 60000);
                    
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify(requestData),
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    
                    if (response.ok) {
                        const data = await response.json();
                        const assistantMessage = data.choices && data.choices[0] && data.choices[0].message 
                            ? data.choices[0].message.content 
                            : '抱歉，未获取到有效回复。';
                        
                        let savedHistory = JSON.parse(localStorage.getItem('bigmodel_conversation_history') || '[]');
                        savedHistory.push({
                            role: 'user',
                            content: message
                        });
                        savedHistory.push({
                            role: 'assistant',
                            content: assistantMessage
                        });
                        
                        if (savedHistory.length > 20) {
                            savedHistory.splice(0, savedHistory.length - 20);
                        }
                        localStorage.setItem('bigmodel_conversation_history', JSON.stringify(savedHistory));
                        
                        addMessage('ai', assistantMessage);
                    } else {
                        const errorData = await response.json().catch(() => ({}));
                        const errorMsg = errorData.error && errorData.error.message 
                            ? errorData.error.message 
                            : response.statusText;
                        throw new Error(`BigModel API请求失败: ${errorMsg}`);
                    }
                } catch (error) {
                    console.error('调用BigModel API失败:', error);
                    if (error.name === 'AbortError') {
                        addMessage('ai', '抱歉，请求超时，请稍后重试。');
                    } else {
                        addMessage('ai', `抱歉，调用BigModel服务时出现错误: ${error.message}`);
                    }
                }
            }

                        conversation_id: localStorage.getItem('conversationId') || '',
                        user: 'user-' + Date.now()
                    };
                    
                    const response = await fetch(`${config.apiBaseUrl}/chat-messages`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify(requestData)
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        if (data.conversation_id) {
                            localStorage.setItem('conversationId', data.conversation_id);
                        }
                        addMessage('ai', data.answer);
                    } else {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(`API请求失败: ${errorData.error || response.statusText}`);
                    }
                } catch (error) {
                    console.error('调用API失败:', error);
                    addMessage('ai', '抱歉，调用服务时出现错误，请稍后重试。');
                }
            }
        });
    </script>
</body>
</html>
